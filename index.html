  ...(window.SCRAPED_EVENTS || FALLBACK_EVENTS),
  ...MANUAL_EVENTS,
];

// 更新日時表示
const updatedEl = document.getElementById('updated-at');
if (updatedEl) {
  updatedEl.textContent = window.SCRAPED_EVENTS_UPDATED || 'データなし';

// Group by date
function eventsForDate(dateStr) {
  return ALL_EVENTS.filter(e => e.date === dateStr);
}

function pad(n) { return String(n).padStart(2, '0'); }
function fmtH(h) {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  return `${hh}:${pad(mm)}`;
}
function toDateStr(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }

// ── Render ───────────────────────────────────────────────────────────────────

let curYear  = 2026;
let curMonth = 4;

(function initMonth() {
  const t = new Date();
  curYear  = t.getFullYear();
  curMonth = t.getMonth() + 1;
})();

function todayStr() {
  const t = new Date();
  return toDateStr(t.getFullYear(), t.getMonth() + 1, t.getDate());
}

function buildTimeAxis() {
  ['time-axis', 'time-axis-bottom'].forEach(id => {
    const axis = document.getElementById(id);
    if (!axis) return;
    axis.innerHTML = '';
    for (let h = TIME_START; h < TIME_END; h++) {
      const mark = document.createElement('div');
      mark.className = 'hour-mark';
      mark.style.left = pct(h);
      mark.textContent = h + ':00';
      axis.appendChild(mark);
    }
  });
}

function makeBar(left, width, cls, labelText, tooltip) {
  const bar = document.createElement('div');
  bar.className = 'bar ' + cls;
  bar.style.left  = left;
  bar.style.width = width;
  bar.title       = tooltip;
  const span = document.createElement('span');
  span.className = 'bar-label';
  span.textContent = labelText;
  bar.appendChild(span);
  return bar;
}

function renderGantt() {
  const today = todayStr();
  const body = document.getElementById('gantt-body');
  body.innerHTML = '';

  const daysInMonth = new Date(curYear, curMonth, 0).getDate();

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = toDateStr(curYear, curMonth, d);
    const dow     = new Date(curYear, curMonth - 1, d).getDay();
    const dayEvs  = eventsForDate(dateStr);

    const row = document.createElement('div');
    row.className = 'gantt-row'
      + (dateStr === today ? ' today' : '')
      + (dow === 6 ? ' weekend-sat' : dow === 0 ? ' weekend-sun' : '');
    row.dataset.date = dateStr;

    // Date label
    const dateCol = document.createElement('div');
    dateCol.className = 'date-col';
    dateCol.textContent = `${d}(${DOW[dow]})`;
    row.appendChild(dateCol);

    // Event area
    const area = document.createElement('div');
    area.className = 'event-area';

    // Hour grid lines
    for (let h = TIME_START + 1; h < TIME_END; h++) {
      const gl = document.createElement('div');
      gl.className = 'hour-grid-line' + (h % 3 === 0 ? ' major' : '');
      gl.style.left = pct(h);
      area.appendChild(gl);
    }

    if (dayEvs.length === 0) {
      const spacer = document.createElement('div');
      spacer.className = 'empty-row-spacer';
      area.appendChild(spacer);
    } else {
      for (const ev of dayEvs) {
        const arrS  = ev.open - 0.5;
        const arrE  = ev.start;
        const durS  = ev.start;
        const durE  = ev.start + ev.dur;
        const depS  = durE;
        const depE  = Math.min(durE + 1.0, TIME_END);

        // Clamp to visible range
        const visArrS = Math.max(arrS, TIME_START);
        const visArrE = Math.min(arrE, TIME_END);
        const visDurS = Math.max(durS, TIME_START);
        const visDurE = Math.min(durE, TIME_END);
        const visDepS = Math.max(depS, TIME_START);
        const visDepE = Math.min(depE, TIME_END);

        const vn    = VENUE_NAME[ev.venue];
        const cc    = VENUE_COLOR[ev.venue];
        const evRow = document.createElement('div');
        evRow.className = 'ev-row';

        // 時刻未掲載
        if (ev.start === null) {
          evRow.appendChild(makeBar(
            pct(TIME_START), pctW(TIME_END - TIME_START),
            'bar venue-tbd',
            `${ev.title}（時刻未掲載）`,
            `[${vn}] ${ev.title} 時刻未掲載`
          ));
          area.appendChild(evRow);
          continue;
        }

        // Arrive bar
        if (visArrE > visArrS) {
          evRow.appendChild(makeBar(
            pct(visArrS), pctW(visArrE - visArrS),
            'bar ' + cc,
            `入場`,
            `[${vn}] ${ev.title} 入場混雑 ${fmtH(arrS)}〜${fmtH(arrE)}`
          ));
        }

        // During bar (greyed)
        if (visDurE > visDurS) {
          evRow.appendChild(makeBar(
            pct(visDurS), pctW(visDurE - visDurS),
            'bar venue-during',
            ev.title,
            `[${vn}] ${ev.title} 公演中 ${fmtH(durS)}〜${fmtH(durE)}`
          ));
        }

        // Depart bar
        if (visDepE > visDepS) {
          evRow.appendChild(makeBar(
            pct(visDepS), pctW(visDepE - visDepS),
            'bar ' + cc,
            `退場`,
            `[${vn}] ${ev.title} 退場混雑 ${fmtH(depS)}〜${fmtH(depE)}`
          ));
        }

        area.appendChild(evRow);
      }
    }

    row.appendChild(area);
    body.appendChild(row);
  }
}

function updateLabels() {
  const txt = `${curYear}年${curMonth}月`;
  document.getElementById('month-label-top').textContent    = txt;
  document.getElementById('month-label-bottom').textContent = txt;
}

function prevMonth() {
  curMonth--;
  if (curMonth < 1) { curMonth = 12; curYear--; }
  updateLabels(); renderGantt(); renderNowLine();
}
function nextMonth() {
  curMonth++;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  updateLabels(); renderGantt(); renderNowLine();
}

function renderNowLine() {
  document.querySelectorAll('.now-line').forEach(el => el.remove());

  const now = new Date();
  if (curYear !== now.getFullYear() || curMonth !== now.getMonth() + 1) return;

  const h = now.getHours() + now.getMinutes() / 60;
  if (h < TIME_START || h >= TIME_END) return;

  const dateStr = toDateStr(now.getFullYear(), now.getMonth() + 1, now.getDate());
  const row = document.querySelector(`.gantt-row[data-date="${dateStr}"]`);
  if (!row) return;

  const area = row.querySelector('.event-area');
  const line = document.createElement('div');
  line.className = 'now-line';
  line.style.left = pct(h);
  area.appendChild(line);
}

document.getElementById('prev-top').addEventListener('click', prevMonth);
document.getElementById('next-top').addEventListener('click', nextMonth);
document.getElementById('prev-bottom').addEventListener('click', prevMonth);
document.getElementById('next-bottom').addEventListener('click', nextMonth);

buildTimeAxis();
updateLabels();
renderGantt();
renderNowLine();
setInterval(renderNowLine, 60000);
</script>
</body>
</html>
